<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{

    min-height:100vh;
    overflow-x:hidden;
    overflow-y:auto;

    color:white;
}

.bg-slide{
    position:fixed;
    inset:0;
    z-index:-2;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    opacity:0;
    transition:opacity 2s ease-in-out;

    transform:scale(1.05);
}
.bg-slide.active{
    opacity:1;
    
    animation: zoomBg 8s ease-in-out infinite alternate;
}

.bg-slide::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.4);
}

@keyframes zoomBg{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

.page{

    min-height:100vh;
    height:auto;

    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.active{
    display:flex;
}

.box{
    width:100%;
    max-width:550px;
    background:rgba(20,20,60,.85);
    border:3px solid #ff6ec7;
    border-radius:25px;
    padding:25px;
    text-align:center;
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    cursor:move;
    touch-action:none;
    z-index:10;

    min-width:260px;
    min-height:200px;
}

.chat-bubble{
    background:#1f6b52;
    padding:12px;
    margin:10px 0;
    border-radius:15px;
    width:fit-content;
    margin-left:auto;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#ff2e8f;
    color:white;
    text-decoration:none;
    border:none;
    border-radius:25px;
    cursor:pointer;
}

.board{
    display:grid;
 grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:20px;
}

.card{
    height:80px;
    background:white;
    border-radius:15px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:35px;

    cursor:pointer;

    transform-style:preserve-3d;
    transition:.4s;
    user-select:none;
}

.card.flip{
    transform:rotateY(180deg);
    background:#fff0f8;
}

.card.matched{
    background:#ffc8e8;
    transform:scale(1.08);
}

.gift{
    font-size:120px;
    animation:float 2s infinite;
}

@keyframes float{
    50%{
        transform:translateY(-15px);
    }
}

#typingText{
    text-align:left;
    white-space:pre-line;
    line-height:1.8;
    margin-top:15px;
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}

@media (max-width:768px){
    .box{
        width:92vw;
        max-width:92vw;
        left:50%;
        top:50%;
        transform:translate(-50%,-50%);

        padding:18px;
    }

}

@media (min-width:769px){

}

.page{

.lockBtn{

.card,

.balloon{

    z-index:2;
}





</style>

<script>

// MEMORY GAME
const emojis=[
"🎂","🎂",

"🎁","🎁",
"🎉","🎉",
"🌸","🌸",
"😭","😭"
];

emojis.sort(()=>Math.random()-0.5);

let first=null;
let second=null;
let lock=false;
let matched=0;

const board=document.getElementById("board");

emojis.forEach(emoji=>{

    const card=document.createElement("div");

   card.dataset.emoji = emoji;
card.textContent = "";

   gamePage.classList.remove("active");
giftPage.classList.add("active");
localStorage.setItem("page", "giftPage");

second.classList.remove("flip");

first.textContent = "";
second.textContent = "";

function resetGame() {
    const board = document.getElementById("board");
    board.innerHTML = ""; // hapus semua kartu

    first = null;
    second = null;
    lock = false;
    matched = 0;

    // shuffle ulang
    emojis.sort(() => Math.random() - 0.5);

    emojis.forEach(emoji => {
        const card = document.createElement("div");

        card.className = "card";
        card.dataset.emoji = emoji;
        card.textContent = "";

        card.onclick = () => {

            if (card.classList.contains("flip")) return;

            card.classList.add("flip");
            card.textContent = card.dataset.emoji;

            if (!first) {
                first = card;
                return;
            }

            second = card;

            if (first.innerHTML === second.innerHTML) {

                first.classList.add("matched");
                second.classList.add("matched");

                first = null;
                second = null;

                matched++;

                if (matched === 6) {
                    setTimeout(() => {
                        gamePage.classList.remove("active");
                        giftPage.classList.add("active");
                        localStorage.setItem("page", "giftPage");

                }

            } else {

                lock = true;

                setTimeout(() => {
                    first.classList.remove("flip");
                    second.classList.remove("flip");

                    first.textContent = "";
                    second.textContent = "";

                    first = null;
                    second = null;
                    lock = false;

                }, 800);
            }
        };

        board.appendChild(card);
    });
}

// CONFETTI
function confetti(){

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const p = [];
const balloons = [];
const ribbons = [];

// Confetti
for(let i=0;i<100;i++){

    p.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*5+2,
        s:Math.random()*3+1
    });

}

// Balon
for(let i=0;i<15;i++){

    balloons.push({
        x: Math.random()*canvas.width,
        y: canvas.height + Math.random()*500,
        r: 20 + Math.random()*15,
        speed: 0.5 + Math.random()*1.5
    });

}

// Pita
for(let i=0;i<10;i++){

    ribbons.push({
        x: Math.random()*canvas.width,
        y: Math.random()*80,
        length: 30 + Math.random()*30
    });

}
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

p.forEach(a=>{

ctx.beginPath();
ctx.arc(a.x,a.y,a.r,0,Math.PI*2);

ctx.fillStyle=
`hsl(${Math.random()*360},100%,70%)`;

ctx.fill();

a.y+=a.s;

if(a.y>canvas.height)
a.y=-20;

});
// ====================
// BALON TERBANG
// ====================

balloons.forEach(b=>{

    ctx.beginPath();
    ctx.arc(
        b.x,
        b.y,
        b.r,
        0,
        Math.PI*2
    );

    ctx.fillStyle =
    `hsl(${(b.x+b.y)%360},90%,70%)`;

    ctx.fill();

    // tali balon
    ctx.beginPath();
    ctx.moveTo(b.x,b.y+b.r);

    ctx.lineTo(
        b.x,
        b.y+b.r+30
    );

    ctx.strokeStyle="white";
    ctx.stroke();

    b.y -= b.speed;

    if(b.y < -100){

        b.y = canvas.height + 100;
        b.x = Math.random()*canvas.width;

    }

});

// ====================
// PITA ATAS
// ====================

ribbons.forEach(r=>{

    ctx.save();

    ctx.translate(r.x,r.y);

    ctx.rotate(
        Math.sin(Date.now()/500+r.x)*0.3
    );

    ctx.fillStyle =
    `hsl(${r.x%360},100%,70%)`;

    ctx.fillRect(
        0,
        0,
        8,
        r.length
    );

    ctx.restore();

});
requestAnimationFrame(draw);

}

draw();

} // <-- fungsi confetti selesai di sini



// ==========================
// BACKGROUND SLIDESHOW
// ==========================

const images = [
    "fotobersama.png",
    "foto2.png",
    "foto3.png",
    "foto4.png"
];

const slides =
document.querySelectorAll(".bg-slide");

let currentImage = 0;
let currentSlide = 0;

slides[0].style.backgroundImage =
`url('${images[0]}')`;

setInterval(() => {

    currentImage++;

    if(currentImage >= images.length){
        currentImage = 0;
    }

    const nextSlide = currentSlide === 0 ? 1 : 0;

    slides[nextSlide].style.backgroundImage =
    `url('${images[currentImage]}')`;

    // reset animasi biar smooth tiap ganti
    slides[nextSlide].style.animation = "none";
    void slides[nextSlide].offsetWidth;
    slides[nextSlide].style.animation = "zoomBg 8s ease-in-out infinite alternate";

    slides[nextSlide].classList.add("active");
    slides[currentSlide].classList.remove("active");

    currentSlide = nextSlide;

}, 5000);

// =========================
// DRAG & LOCK BOX
// =========================

document.querySelectorAll(".box").forEach(box => {

    const btn = box.querySelector(".lockBtn");

    if(!btn) return;

    let locked = false;
    let isDragging = false;

    let offsetX = 0;
    let offsetY = 0;

    btn.onclick = function(e){

        e.stopPropagation();

        locked = !locked;

        if(locked){
            btn.innerHTML = "🔒 tidak geser";
        }else{
            btn.innerHTML = "🔓 bisa geser";
        }

    };

box.addEventListener("mousedown", function(e){

    if(locked) return;

    isDragging = true;

    offsetX = e.clientX - box.getBoundingClientRect().left;
    offsetY = e.clientY - box.getBoundingClientRect().top;

});

document.addEventListener("mousemove", function(e){

    if(!isDragging || locked) return;

    box.style.left = (e.clientX - offsetX) + "px";
    box.style.top = (e.clientY - offsetY) + "px";
box.style.transform = "none";
keepBoxInsideScreen(box);
});

    document.addEventListener("mouseup", function(){

        isDragging = false;

    });

    box.addEventListener("touchstart", function(e){

        if(locked) return;

        const touch = e.touches[0];

        isDragging = true;

        offsetX = touch.clientX - box.offsetLeft;
        offsetY = touch.clientY - box.offsetTop;

    });

    document.addEventListener("touchmove", function(e){

        if(!isDragging || locked) return;

        const touch = e.touches[0];

        box.style.left = (touch.clientX - offsetX) + "px";
        box.style.top = (touch.clientY - offsetY) + "px";
        box.style.transform = "none";

    });

    document.addEventListener("touchend", function(){

        isDragging = false;

    });

});


document.querySelectorAll(".box").forEach(box => {

    const handle = box.querySelector(".resize-handle");
    if(!handle) return;

    let resizing = false;

    handle.addEventListener("mousedown", startResize);
    handle.addEventListener("touchstart", startResize);

    function startResize(e){
        e.preventDefault();
        resizing = true;
    }

    document.addEventListener("mousemove", resize);
    document.addEventListener("touchmove", resize);

    document.addEventListener("mouseup", ()=> resizing=false);
    document.addEventListener("touchend", ()=> resizing=false);

    function resize(e){
        if(!resizing) return;

        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const rect = box.getBoundingClientRect();

        box.style.width = (clientX - rect.left) + "px";
        box.style.height = (clientY - rect.top) + "px";
    }

});


function backToChat() {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("chatPage").classList.add("active");

    localStorage.setItem("page", "chatPage");

    resetGame(); // 🔥 ini yang bikin game reset
}




window.addEventListener("load", () => {

    const savedPage = localStorage.getItem("page");

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

    if (savedPage === "messagePage") {

        localStorage.setItem("page", "chatPage");
        document.getElementById("chatPage").classList.add("active");

    } else if (savedPage && document.getElementById(savedPage)) {

        document.getElementById(savedPage).classList.add("active");

    } else {

        document.getElementById("chatPage").classList.add("active");

    }

})

document.getElementById("startBtn").onclick = () => {
    chatPage.classList.remove("active");

};

</script>
